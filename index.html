<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Collection</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  background:#050505;
  color:white;
  overflow-x:hidden;
}

/* =========================
   HALAMAN HOME
========================= */

.home-page{
  position:relative;
  width:100%;
  height:100vh;
  overflow:hidden;
}

.bg-image{
  position:absolute;
  width:100%;
  height:100%;
  inset:0;
  object-fit:cover;
}

.overlay{
  position:absolute;
  inset:0;
  background:
  linear-gradient(
    to right,
    rgba(0,0,0,0.88),
    rgba(0,0,0,0.45)
  );
  backdrop-filter:blur(2px);
}

/* NAVBAR */

.navbar{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  padding:28px 60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:10;
}

.logo{
  font-size:30px;
  font-weight:700;
  color:#d4a45f;
}

.navbar ul{
  display:flex;
  gap:40px;
  list-style:none;
}

.navbar ul li{
  cursor:pointer;
  transition:0.3s;
}

.navbar ul li:hover{
  color:#d4a45f;
}

/* HERO */

.hero-content{
  position:absolute;
  z-index:10;
  top:50%;
  left:60px;
  transform:translateY(-50%);
  max-width:600px;
}

.hero-content span{
  color:#d4a45f;
  letter-spacing:4px;
  font-size:13px;
}

.hero-content h1{
  font-size:90px;
  line-height:0.95;
  margin:18px 0;
}

.hero-content p{
  color:#ddd;
  line-height:1.7;
  margin-bottom:28px;
}

.hero-content button{
  padding:15px 35px;
  border:none;
  background:#d4a45f;
  color:black;
  font-weight:700;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.hero-content button:hover{
  transform:scale(1.05);
}

/* =========================
   HALAMAN VIDEO
========================= */

.video-page{
  display:none;
  min-height:100vh;
  padding:30px;
  background:#050505;
}

/* VIDEO BESAR */

.main-video{
  width:100%;
  height:75vh;
  border-radius:22px;
  overflow:hidden;
  background:#000;
  margin-bottom:30px;
  box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

.main-video video{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:22px;
}

/* BANNER */

.banner-ads{
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  margin:25px 0;
  overflow:hidden;
}

/* VIDEO LIST */

.video-list{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:22px;
}

.video-item{
  background:#111;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
  border:1px solid rgba(255,255,255,0.06);
}

.video-item:hover{
  transform:translateY(-8px);
}

.video-item video{
  width:100%;
  height:180px;
  object-fit:cover;
  pointer-events:none;
}

.video-info{
  padding:14px;
}

.video-title{
  color:#f1d2a1;
  font-size:16px;
  font-weight:600;
}

.video-desc{
  color:#aaa;
  margin-top:6px;
  font-size:14px;
  line-height:1.5;
}

/* BUTTON */

.back-btn{
  margin-bottom:20px;
  padding:12px 24px;
  border:none;
  background:#d4a45f;
  color:black;
  font-weight:700;
  border-radius:10px;
  cursor:pointer;
}

/* MOBILE */

@media(max-width:768px){

  .navbar{
    padding:20px;
  }

  .navbar ul{
    display:none;
  }

  .hero-content{
    left:20px;
    right:20px;
  }

  .hero-content h1{
    font-size:55px;
  }

  .video-page{
    padding:15px;
  }

  .main-video{
    height:55vh;
  }

}

</style>
</head>

<body>

<!-- =========================
     HOME PAGE
========================= -->

<section class="home-page" id="homePage">

  <img src="108513.jpg" class="bg-image">

  <div class="overlay"></div>

  <nav class="navbar">

    <div class="logo">
      movie clips
    </div>

    <ul>
      <li>HOME</li>
      <li>COLLECTION</li>
      <li>TRENDING</li>
      <li>CONTACT</li>
    </ul>

  </nav>

  <div class="hero-content">

    <span>VIDEO</span>

    <h1>
      Viral <br>
      terbaru.
    </h1>

    <p>
      Kumpulan video trending.
    </p>

    <button onclick="openVideos()">
      Masuk
    </button>

  </div>

</section>

<!-- =========================
     VIDEO PAGE
========================= -->

<section class="video-page" id="videoPage">

  <button class="back-btn" onclick="goHome()">
    ← Kembali
  </button>

  <!-- VIDEO BESAR -->

  <div class="main-video">

    <video
      id="mainPlayer"
      controls
      autoplay
      controlsList="nodownload noplaybackrate noremoteplayback"
      disablePictureInPicture
    >
      <source src="Ad.mp4" type="video/mp4">
    </video>

  </div>

  <!-- BANNER IKLAN -->

  <div class="banner-ads">

    <script async="async" data-cfasync="false"
    src="https://sireimplement.com/83d5edc9887aba56c2cdb2e856dd539e/invoke.js">
    </script>

    <div id="container-83d5edc9887aba56c2cdb2e856dd539e"></div>

  </div>

  <!-- LIST VIDEO -->

  <div class="video-list">

    <!-- VIDEO 1 -->

    <div class="video-item" onclick="changeVideo('Ad.mp4')">

      <video muted>
        <source src="Ad.mp4" type="video/mp4">
      </video>

      <div class="video-info">

        <div class="video-title">
          Video Viral 01
        </div>

        <div class="video-desc">
          Video trending terbaru kualitas HD.
        </div>

      </div>

    </div>

    <!-- VIDEO 2 -->

    <div class="video-item" onclick="changeVideo('video2.mp4')">

      <video muted>
        <source src="video2.mp4" type="video/mp4">
      </video>

      <div class="video-info">

        <div class="video-title">
          Video Viral 02
        </div>

        <div class="video-desc">
          Koleksi video populer terbaru.
        </div>

      </div>

    </div>

    <!-- VIDEO 3 -->

    <div class="video-item" onclick="changeVideo('video3.mp4')">

      <video muted>
        <source src="video3.mp4" type="video/mp4">
      </video>

      <div class="video-info">

        <div class="video-title">
          Video Viral 03
        </div>

        <div class="video-desc">
          Video pilihan.
        </div>

      </div>

    </div>

    <!-- VIDEO 4 -->

    <div class="video-item" onclick="changeVideo('video4.mp4')">

      <video muted>
        <source src="video4.mp4" type="video/mp4">
      </video>

      <div class="video-info">

        <div class="video-title">
          Video Viral 04
        </div>

        <div class="video-desc">
          Trending paling ramai ditonton.
        </div>

      </div>

    </div>

  </div>

</section>

<!-- POPUNDER -->

<script src="https://rungbeacon.com/ac/cd/19/accd19456467f32573107aa43783b50a.js"></script>

<script>

function openVideos(){

  document.getElementById("homePage").style.display = "none";
  document.getElementById("videoPage").style.display = "block";

}

function goHome(){

  document.getElementById("videoPage").style.display = "none";
  document.getElementById("homePage").style.display = "block";

}

function changeVideo(videoSrc){

  const player = document.getElementById("mainPlayer");

  player.src = videoSrc;

  player.play();

}

</script>

</body>
  </html>
